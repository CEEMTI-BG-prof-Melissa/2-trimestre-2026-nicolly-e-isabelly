<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title> Controle de Formulários </title>
    </head>
    <body>
        <form action="index.html" method="get">
            <h1> Preferências </h1>
            <p> Nome: </p>
            <input type="text" id="nome" name="nome">
            
            <p> Qual turno você prefere estudar? </p>
            <input type="radio" id="turno" name="turno">
            <label for="turno"> Manhã</label> 
            <br>
            <input type="radio" id="turno" name="turno"> 
            <label for="turno"> Tarde</label> 
            <br>
            <input type="radio" id="turno" name="turno"> 
            <label for="turno"> Noite</label>
            <br>
            
            <p> Quais áreas da tecnologia você tem interesse? </p>
            <input type="checkbox" id="programacao" name="programacao"> 
            <label for="programacao"> Programação </label>
            <br>
            <input type="checkbox" id="design" name="design"> 
            <label for="design"> Design </label>
            <br>
            <input type="checkbox" id="bd" name="bd">
            <label for="bd"> Banco de Dados </label>
            <br>
            <input type="checkbox" id="redes" name="redes"> 
            <label for="redes"> Redes </label>
            <br>
            
            <p> Qual a sua cor favorita? </p>
            <input type="color">
            <br>
            
            <p> Qual o seu nível de satisfação? </p>
            <input type="range">
            <br>
            
            <p> Qual o seu horário preferido? </p>
            <input type="time">
            <br>
            
            <p> Envie um arquivo </p>
            <input type="file">
            <br>
            
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </form>
    </body>
</html>
